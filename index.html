<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS ROI Calculator</title>
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1e1b4b;
            --accent: #4f46e5;
            --accent-muted: #e0e7ff;
            --border: #e2e8f0;
            --font: system-ui, sans-serif;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .calculator {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            text-align: center;
            color: var(--accent);
        }

        .slider-group {
            margin-bottom: 24px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .input-manual {
            width: 80px;
            text-align: right;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 5px;
            font-family: inherit;
            font-weight: bold;
            outline: none;
        }

        .results {
            background-color: var(--accent-muted);
            border-radius: 8px;
            padding: 20px;
            margin-top: 24px;
            text-align: center;
        }

        .results-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            font-weight: 700;
        }

        .results-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>SaaS ROI Calculator</h2>
        
        <div class="slider-group">
            <div class="label-row">
                <span>Average Deal Size ($)</span>
                <input type="number" id="deal-manual" class="input-manual" value="5000" min="500" max="50000">
            </div>
            <input type="range" id="deal-slider" min="500" max="50000" step="500" value="5000" oninput="syncInputs('deal')">
        </div>

        <div class="slider-group">
            <div class="label-row">
                <span>Monthly Platform Cost ($)</span>
                <input type="number" id="cost-manual" class="input-manual" value="400" min="50" max="5000">
            </div>
            <input type="range" id="cost-slider" min="50" max="5000" step="50" value="400" oninput="syncInputs('cost')">
        </div>

        <div class="results">
            <div class="results-label">Estimated Annual ROI</div>
            <div class="results-value" id="roi-value">1400%</div>
            <div style="font-size: 0.8rem; opacity: 0.8;">Based on securing at least 15 additional deals per year.</div>
        </div>
    </div>

    <script>
        const dealSlider = document.getElementById('deal-slider');
        const dealManual = document.getElementById('deal-manual');
        const costSlider = document.getElementById('cost-slider');
        const costManual = document.getElementById('cost-manual');
        const roiValue = document.getElementById('roi-value');

        function syncInputs(type) {
            if (type === 'deal') {
                dealManual.value = dealSlider.value;
            } else {
                costManual.value = costSlider.value;
            }
            calculateROI();
        }

        // Handle manual numerical updates
        dealManual.addEventListener('input', () => {
            dealSlider.value = dealManual.value;
            calculateROI();
        });

        costManual.addEventListener('input', () => {
            costSlider.value = costManual.value;
            calculateROI();
        });

        function calculateROI() {
            const deal = parseFloat(dealManual.value) || 0;
            const monthlyCost = parseFloat(costManual.value) || 1;
            const annualCost = monthlyCost * 12;
            
            // Assume the software closes a baseline of 15 extra deals annually
            const grossReturn = deal * 15;
            const netReturn = grossReturn - annualCost;
            const roi = (netReturn / annualCost) * 100;

            roiValue.textContent = Math.round(roi) + '%';
        }
    </script>
</body>
</html>
