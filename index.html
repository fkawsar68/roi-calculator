<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS ROI Calculator</title>
    <style>
        :root {
            --bg-base: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #e0e7ff;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg-base);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calc-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 540px;
            box-shadow: var(--shadow);
        }

        .calc-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .calc-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .calc-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 24px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .label-row span {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .input-box-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
        }

        .currency-symbol {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-right: 4px;
        }

        .input-manual {
            width: 80px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            text-align: right;
            outline: none;
        }

        /* Modern Range Input styling */
        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .output-box {
            background-color: var(--accent-light);
            border: 1px solid rgba(79, 70, 229, 0.15);
            border-radius: 12px;
            padding: 24px;
            margin-top: 28px;
            text-align: center;
        }

        .output-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .output-val {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
            border-top: 1px solid rgba(79, 70, 229, 0.1);
            padding-top: 15px;
            font-size: 0.8rem;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .detail-lbl {
            color: var(--text-muted);
        }

        .detail-val {
            font-weight: 700;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="calc-card">
        <div class="calc-header">
            <h2>SaaS ROI Calculator</h2>
            <p>Calculate your net return on investment dynamically</p>
        </div>

        <!-- INPUT 1: SOFTWARE COST -->
        <div class="input-group">
            <div class="label-row">
                <span>Monthly Software Cost</span>
                <div class="input-box-wrapper">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="cost-manual" class="input-manual" value="400" min="50" max="5000">
                </div>
            </div>
            <input type="range" id="cost-slider" min="50" max="5000" step="50" value="400" oninput="syncInputs('cost')">
        </div>

        <!-- INPUT 2: DEAL VALUE -->
        <div class="input-group">
            <div class="label-row">
                <span>Average Deal Value</span>
                <div class="input-box-wrapper">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="deal-manual" class="input-manual" value="5000" min="500" max="50000">
                </div>
            </div>
            <input type="range" id="deal-slider" min="500" max="50000" step="500" value="5000" oninput="syncInputs('deal')">
        </div>

        <!-- INPUT 3: CLOSES PER YEAR -->
        <div class="input-group">
            <div class="label-row">
                <span>Additional Deals Closed / Year</span>
                <div class="input-box-wrapper">
                    <input type="number" id="closes-manual" class="input-manual" value="12" min="1" max="100">
                </div>
            </div>
            <input type="range" id="closes-slider" min="1" max="100" step="1" value="12" oninput="syncInputs('closes')">
        </div>

        <!-- OUTPUT GRID -->
        <div class="output-box">
            <div class="output-label">Annual Return on Investment</div>
            <div class="output-val" id="roi-val">1,150%</div>
            
            <div class="details-grid">
                <div class="detail-item">
                    <span class="detail-lbl">Annual Cost</span>
                    <span class="detail-val" id="annual-cost">$4,800</span>
                </div>
                <div class="detail-item">
                    <span class="detail-lbl">Net Cash Return</span>
                    <span class="detail-val" id="net-return">$55,200</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const costSlider = document.getElementById('cost-slider');
        const costManual = document.getElementById('cost-manual');
        const dealSlider = document.getElementById('deal-slider');
        const dealManual = document.getElementById('deal-manual');
        const closesSlider = document.getElementById('closes-slider');
        const closesManual = document.getElementById('closes-manual');

        const roiValueElement = document.getElementById('roi-val');
        const annualCostElement = document.getElementById('annual-cost');
        const netReturnElement = document.getElementById('net-return');

        function syncInputs(type) {
            if (type === 'cost') {
                costManual.value = costSlider.value;
            } else if (type === 'deal') {
                dealManual.value = dealSlider.value;
            } else if (type === 'closes') {
                closesManual.value = closesSlider.value;
            }
            calculateROI();
        }

        // Add manual input validation listeners
        costManual.addEventListener('input', () => {
            costSlider.value = costManual.value;
            calculateROI();
        });
        dealManual.addEventListener('input', () => {
            dealSlider.value = dealManual.value;
            calculateROI();
        });
        closesManual.addEventListener('input', () => {
            closesSlider.value = closesManual.value;
            calculateROI();
        });

        function calculateROI() {
            const monthlyCost = parseFloat(costManual.value) || 0;
            const dealValue = parseFloat(dealManual.value) || 0;
            const additionalCloses = parseFloat(closesManual.value) || 0;

            const annualCost = monthlyCost * 12;
            const grossReturn = dealValue * additionalCloses;
            const netReturn = grossReturn - annualCost;

            let roi = 0;
            if (annualCost > 0) {
                roi = (netReturn / annualCost) * 100;
            }

            // Display outputs formatted with commas
            annualCostElement.textContent = '$' + Math.round(annualCost).toLocaleString();
            netReturnElement.textContent = '$' + Math.round(netReturn).toLocaleString();
            roiValueElement.textContent = Math.round(roi).toLocaleString() + '%';
        }

        // Initial Calculation
        calculateROI();
    </script>
</body>
</html>
